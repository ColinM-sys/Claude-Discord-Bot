# Discord Agent Workflow - Uses code_execution to send to Discord
#
# Run: nat run --config_file discord_agent_workflow.yaml --input "Send hello to Discord"
# Or:  nat serve --config_file discord_agent_workflow.yaml

general:
  use_uvloop: true

functions:
  # Code execution - can run Python to send HTTP requests
  code_execution:
    _type: code_execution

  # Calculator tools
  calculator_multiply:
    _type: calculator_multiply
  calculator_divide:
    _type: calculator_divide

  # Get current time
  current_datetime:
    _type: current_datetime

llms:
  claude:
    _type: litellm
    model: claude-3-haiku-20240307
    model_name: claude-3-haiku-20240307
    temperature: 0.0
    max_tokens: 4096
    # System prompt to tell the agent about Discord
    system_message: |
      You have access to a code_execution tool that can run Python code.

      To send messages to Discord, use this code pattern:
      ```python
      import httpx
      response = httpx.post(
          "https://discord.com/api/webhooks/1468755373895716960/RBmdlngV5ACMYuYZtfTM-k1bRrFCf4_QU-iSXejt2qvL2AyBTMfO2ulK8cwDxk_-CN2-",
          json={"username": "Claude Agent", "content": "YOUR MESSAGE HERE"}
      )
      print("Sent!" if response.status_code == 204 else f"Error: {response.status_code}")
      ```

      When asked to send something to Discord, use this pattern with the code_execution tool.

workflow:
  _type: react_agent
  tool_names:
    - code_execution
    - calculator_multiply
    - calculator_divide
    - current_datetime
  llm_name: claude
  verbose: true
  parse_agent_response_max_retries: 3
