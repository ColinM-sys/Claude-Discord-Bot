# Action Agent Workflow
# This agent can submit data to APIs and run commands
#
# Install custom tools first:
#   pip install -e my_plugins/custom_tools
#
# Run: nat run --config_file action_agent_workflow.yaml --input "your request"

general:
  use_uvloop: true

functions:
  # Submit data to a webhook/API
  submit_data:
    _type: http_submit
    endpoint_url: "https://httpbin.org/post"  # Test endpoint - replace with your API
    method: POST

  # Run shell commands (restricted for safety)
  run_command:
    _type: shell_command
    allowed_commands: ["echo", "date", "dir", "type", "python"]
    working_dir: "."
    timeout: 30

  # Built-in code execution
  code_execution:
    _type: code_execution

  # Get current time
  current_datetime:
    _type: current_datetime

llms:
  claude:
    _type: litellm
    model: claude-3-haiku-20240307
    model_name: claude-3-haiku-20240307
    temperature: 0.0
    max_tokens: 4096

workflow:
  _type: tool_calling_agent
  tool_names:
    - submit_data
    - run_command
    - code_execution
    - current_datetime
  llm_name: claude
  verbose: true
